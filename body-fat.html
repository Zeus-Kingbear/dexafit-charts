<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Healthy Body Fat % — DexaFit Scottsdale Education Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/chrome.css?v=1">
<style>
  :root{
    --ink:#10151B; --ink-soft:#3A4753;
    --surface:#FFFFFF; --surface-2:#EEF3F7; --surface-3:#E2EAF0;
    --brand:#0E9BD6; --brand-deep:#0A6F9E;
    --lean:#3AA0D6; --healthy:#2E9E5B; --avg:#EAC043; --high:#DC4636;
    font-synthesis:none;
  }
  .seg{display:inline-flex;background:var(--surface-2);border-radius:14px;padding:4px;gap:4px;}
  .seg button{border:0;background:transparent;font:inherit;font-weight:700;padding:11px 16px;border-radius:10px;
    color:var(--ink-soft);cursor:pointer;min-height:46px;}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff;}
  .agewrap,.bfwrap{display:flex;align-items:center;gap:12px;min-width:230px;}
  .agewrap input[type=range],.bfwrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;
    background:linear-gradient(90deg,var(--surface-3),var(--brand));outline:none;}
  .agewrap input[type=range]::-webkit-slider-thumb,.bfwrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;
    background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;}
  .agewrap input[type=range]::-moz-range-thumb,.bfwrap input[type=range]::-moz-range-thumb{width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);cursor:pointer;}
  .ageval,.bfval{font-family:"Archivo";font-weight:800;font-size:22px;min-width:46px;text-align:center;}
  .chip{display:inline-flex;align-items:center;gap:9px;border:2px solid var(--surface-3);background:var(--surface);
    border-radius:13px;padding:11px 16px;font:inherit;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:46px;}
  .chip .dot{width:14px;height:14px;border-radius:4px;border:2px solid #C2CDD6;}
  .chip[aria-pressed="true"]{border-color:var(--brand-deep);color:var(--ink);background:#F1F9FD;}
  .chip[aria-pressed="true"] .dot{background:var(--brand);border-color:var(--brand-deep);}
  @media (max-width:860px){ .topbar{gap:12px;padding:12px 14px;} .agewrap,.bfwrap{min-width:170px;} }
</style>
<script src="/assets/chrome.js?v=1"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"></div>
    <div class="spacer"></div>
    <div class="gctl">
      <span class="lbl">Sex</span>
      <div class="seg" id="sexSeg">
        <button data-sex="male" aria-pressed="true">Male</button>
        <button data-sex="female" aria-pressed="false">Female</button>
      </div>
    </div>
    <div class="gctl agewrap">
      <span class="lbl">Age</span>
      <input id="ageRange" type="range" min="20" max="79" value="40" step="1">
      <span class="ageval" id="ageVal">40</span>
    </div>
  </div>

  <div class="chart">
    <div class="chead">
      <div class="ctitle">Healthy body fat — and where people really sit</div>
      <div class="ccontext" id="cContext">Male · DXA (GE Lunar)</div>
    </div>
    <div class="stage">
      <div class="plot" id="plot"></div>
      <div class="controls">
        <div class="gctl bfwrap">
          <span class="lbl" style="white-space:nowrap">Body fat %</span>
          <input id="bfRange" type="range" min="4" max="55" value="20" step="0.5">
          <span class="bfval" id="bfVal">20%</span>
        </div>
        <button class="chip" id="spreadChip" aria-pressed="true"><span class="dot"></span>Show where people actually are</button>
        <span class="ctl-note" id="note"></span>
      </div>
    </div>
  </div>
</div>



<script>

window.HELP_TITLE="Body-fat percentile & healthy zones";window.HELP_BODY="<p>Where a body-fat percentage ranks against your age and sex, with healthy zones that shift with age and the essential-fat floor marked.</p><p><strong>How to use it:</strong> set your sex and age to see the ranking and the healthy band. The goal is a healthy range, not the lowest number.</p>";


/* ============================================================================
   DATA
   Population %BF: GE Lunar reference, Imboden/Kaminsky 2017 (n=3,327, PLOS ONE) —
     matches a DexaFit scanner. Table 2 values are leanness percentiles
     (90th = leaner than 90%). Mean overall: men 28.3%, women 38.6%.
   Healthy zones: Gallagher 2000 (AJCN) age-adjusted healthy/over/obese ranges,
     which rise with age (the data behind "carry a little more as you age").
   Category floor: essential fat (ACE/ACSM): men ~5%, women ~12%.
   ========================================================================== */
const AGES=[25,35,45,55,65,75];
const PCTL=[90,80,70,60,50,40,30,20,10];   // leanness percentile for each column
const PCTV = {
  male:[
    [11.0,14.0,16.5,18.5,20.2,22.7,25.6,28.7,31.8],
    [11.2,17.2,19.2,23.3,26.4,30.2,33.7,36.6,39.9],
    [15.8,22.2,25.8,28.4,30.1,31.5,33.9,36.9,41.0],
    [20.0,24.1,26.8,29.4,31.4,33.7,35.7,37.9,40.8],
    [21.0,25.1,27.3,29.4,31.6,33.5,34.7,37.2,40.7],
    [23.0,25.7,28.0,29.4,32.4,34.0,35.7,37.4,39.6]],
  female:[
    [22.1,24.5,26.4,28.1,29.9,32.1,35.4,38.3,43.2],
    [21.4,26.8,29.3,33.4,36.8,40.6,43.6,46.8,50.7],
    [24.5,31.4,34.3,37.4,40.0,42.6,44.5,48.2,51.0],
    [30.3,34.4,38.0,40.5,42.7,45.0,47.0,49.3,51.8],
    [32.5,35.5,38.6,40.8,42.4,44.9,47.0,49.1,52.2],
    [30.5,35.5,37.9,39.6,41.2,43.5,45.8,48.2,50.1]]
};
const PMED = { male:[20.2,26.4,30.1,31.4,31.6,32.4], female:[29.9,36.8,40.0,42.7,42.4,41.2] };
/* Gallagher healthy-zone boundaries at ages 30 / 50 / 70: lean|healthy, healthy|over, over|obese */
const ZB = {
  male:   { low:[8,11,13],  high:[20,22,25], ob:[25,28,30] },
  female: { low:[21,23,24], high:[33,34,36], ob:[39,40,42] }
};
const ESSENTIAL = { male:5, female:12 };

/* ============================ helpers ============================ */
function ord(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function rowAt(sex,age){            // interpolate the 9 leanness values at an age
  const rows=PCTV[sex]; const a=Math.max(25,Math.min(75,age));
  if(a<=25) return rows[0].slice(); if(a>=75) return rows[5].slice();
  const i=Math.min(4,Math.floor((a-25)/10)), f=((a-25)-i*10)/10;
  return rows[i].map((v,k)=>v+(rows[i+1][k]-v)*f);
}
function medAt(sex,age){
  const m=PMED[sex], a=Math.max(25,Math.min(75,age));
  if(a<=25) return m[0]; if(a>=75) return m[5];
  const i=Math.min(4,Math.floor((a-25)/10)), f=((a-25)-i*10)/10;
  return m[i]+(m[i+1]-m[i])*f;
}
function zbAt(sex,age){
  const z=ZB[sex], a=Math.max(30,Math.min(70,age));
  const ip=arr=> a<=50 ? arr[0]+(arr[1]-arr[0])*(a-30)/20 : arr[1]+(arr[2]-arr[1])*(a-50)/20;
  return { low:ip(z.low), high:ip(z.high), ob:ip(z.ob) };
}
function leanPct(sex,age,bf){        // % of same-age, same-sex people you are leaner than
  const v=rowAt(sex,age);
  if(bf<=v[0]) return Math.min(99, 90+(v[0]-bf));
  if(bf>=v[8]) return Math.max(1, 10-(bf-v[8]));
  for(let k=0;k<8;k++){ if(bf<=v[k+1]){ const f=(bf-v[k])/(v[k+1]-v[k]); return PCTL[k]+(PCTL[k+1]-PCTL[k])*f; } }
  return 50;
}
function catOf(sex,age,bf){
  const z=zbAt(sex,age);
  if(bf<ESSENTIAL[sex]) return ['Below essential fat','#B23A2C'];
  if(bf<z.low)  return ['Lean / athletic','#1E7FB0'];
  if(bf<z.high) return ['Healthy','#1F7A45'];
  if(bf<z.ob)   return ['Above healthy','#B9871B'];
  return ['High','#C0392B'];
}

/* ============================ state ============================ */
const state = { sex:'male', age:40, bf:20, spread:true };

/* ============================ render ============================ */
function render(){
  const host=document.getElementById('plot');
  const W=1040,H=600,m={l:64,r:118,t:50,b:64};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const A0=20,A1=79, F0=4,F1=54;
  const X=a=>m.l+(a-A0)/(A1-A0)*iw;
  const Y=f=>m.t+(F1-f)/(F1-F0)*ih;
  const ages=[]; for(let a=A0;a<=A1;a++) ages.push(a);
  const band=(loFn,hiFn,fill,op)=>{
    const top=ages.map(a=>X(a).toFixed(1)+','+Y(hiFn(a)).toFixed(1));
    const bot=ages.slice().reverse().map(a=>X(a).toFixed(1)+','+Y(loFn(a)).toFixed(1));
    return `<path d="M${top.join(' L')} L${bot.join(' L')} Z" fill="${fill}" opacity="${op}"/>`;
  };
  const lo=a=>zbAt(state.sex,a).low, hi=a=>zbAt(state.sex,a).high, ob=a=>zbAt(state.sex,a).ob;

  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Body fat percentage by age" style="cursor:pointer">`;

  /* age-adjusted category zones (bottom = leaner) */
  svg+=band(()=>F0,lo,'#3AA0D6',.30);     // lean / athletic
  svg+=band(lo,hi,'#2E9E5B',.34);          // healthy
  svg+=band(hi,ob,'#EAC043',.40);          // above healthy
  svg+=band(ob,()=>F1,'#DC4636',.34);      // high
  // zone labels (left)
  const zlab=(f,t,c)=>`<text x="${m.l+10}" y="${Y(f)}" style="font:800 16px Archivo" fill="${c}">${t}</text>`;
  const zb50=zbAt(state.sex,50);
  svg+=zlab((F0+zbAt(state.sex,A0).low)/2,'Lean / athletic','#15678F');
  svg+=zlab((zb50.low+zb50.high)/2,'Healthy','#176B3C');
  svg+=zlab((zb50.high+zb50.ob)/2,'Above healthy','#876111');
  svg+=zlab((zb50.ob+F1)/2+1,'High','#9B2C20');

  /* essential-fat floor */
  const ef=ESSENTIAL[state.sex];
  svg+=`<line x1="${m.l}" y1="${Y(ef)}" x2="${m.l+iw}" y2="${Y(ef)}" stroke="#10151B" stroke-width="1.5" stroke-dasharray="2 6" opacity=".5"/>`;
  svg+=`<text x="${m.l+iw-6}" y="${Y(ef)-6}" text-anchor="end" style="font:700 11px Inter" fill="#3A4753">essential fat (${ef}%) — below is unsafe</text>`;

  /* population spread (toggle): 10th→90th leanness envelope */
  if(state.spread){
    const loP=a=>rowAt(state.sex,a)[0], hiP=a=>rowAt(state.sex,a)[8];
    svg+=band(loP,hiP,'#10151B',.07);
    svg+=`<path d="M${ages.map(a=>X(a).toFixed(1)+','+Y(rowAt(state.sex,a)[0]).toFixed(1)).join(' L')}" fill="none" stroke="#10151B" stroke-width="1" opacity=".30" stroke-dasharray="2 4"/>`;
    svg+=`<path d="M${ages.map(a=>X(a).toFixed(1)+','+Y(rowAt(state.sex,a)[8]).toFixed(1)).join(' L')}" fill="none" stroke="#10151B" stroke-width="1" opacity=".30" stroke-dasharray="2 4"/>`;
    svg+=`<text x="${X(A1)-4}" y="${Y(rowAt(state.sex,A1)[0])-6}" text-anchor="end" style="font:700 11px Inter" fill="#3A4753">leanest 10%</text>`;
    svg+=`<text x="${X(A1)-4}" y="${Y(rowAt(state.sex,A1)[8])+14}" text-anchor="end" style="font:700 11px Inter" fill="#3A4753">heaviest 10%</text>`;
  }

  /* population median (where people actually are) */
  svg+=`<path d="M${ages.map(a=>X(a).toFixed(1)+','+Y(medAt(state.sex,a)).toFixed(1)).join(' L')}" fill="none" stroke="#10151B" stroke-width="3" stroke-dasharray="9 5"/>`;
  svg+=`<text x="${X(A0)+6}" y="${Y(medAt(state.sex,A0))-9}" style="font:800 13px Archivo" fill="#10151B">the average person</text>`;

  /* axes */
  for(let f=10;f<=50;f+=10){
    svg+=`<line x1="${m.l}" y1="${Y(f)}" x2="${m.l+iw}" y2="${Y(f)}" stroke="#10151B" stroke-width="1" opacity=".07"/>`;
    svg+=`<text x="${m.l-10}" y="${Y(f)+5}" text-anchor="end" style="font:600 13px Inter" fill="#3A4753">${f}%</text>`;
  }
  for(let a=20;a<=70;a+=10){
    svg+=`<text x="${X(a)}" y="${m.t+ih+26}" text-anchor="middle" style="font:700 15px Inter" fill="#10151B">${a}</text>`;
  }
  svg+=`<text x="${m.l+iw/2}" y="${m.t+ih+50}" text-anchor="middle" style="font:800 13px Inter" fill="#3A4753">Age (years)</text>`;
  svg+=`<text x="${m.l-44}" y="${m.t-26}" style="font:800 13px Inter" fill="#3A4753">Body fat %</text>`;
  svg+=`<rect x="${m.l}" y="${m.t}" width="${iw}" height="${ih}" fill="none" stroke="#10151B" stroke-width="1.5"/>`;

  /* client marker */
  const mx=X(state.age), my=Y(state.bf), s=9;
  svg+=`<line x1="${mx}" y1="${m.t}" x2="${mx}" y2="${m.t+ih}" stroke="#10151B" stroke-width="1" opacity=".35" stroke-dasharray="4 5"/>`;
  svg+=`<rect x="${mx-s}" y="${my-s}" width="${2*s}" height="${2*s}" fill="#fff" stroke="#10151B" stroke-width="4"/>`;
  svg+=`<rect x="${mx-2}" y="${my-2}" width="4" height="4" fill="#10151B"/>`;

  /* readout */
  const lp=Math.round(leanPct(state.sex,state.age,state.bf));
  const co=catOf(state.sex,state.age,state.bf), cat=co[0], catCol=co[1];
  const boxW=276, boxH=158;
  const boxX = mx>m.l+iw*0.52 ? mx-boxW-22 : mx+22;
  const boxY = Math.max(m.t+8, Math.min(my-boxH/2, m.t+ih-boxH-8));
  svg+=`<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="13" fill="#10151B"/>`;
  let yy=boxY+34;
  svg+=`<text x="${boxX+18}" y="${yy}" fill="#fff" style="font:900 26px Archivo">${state.bf}% body fat</text>`;
  yy+=28;
  svg+=`<rect x="${boxX+14}" y="${yy-18}" width="${boxW-28}" height="32" rx="8" fill="${catCol}"/>`;
  svg+=`<text x="${boxX+boxW/2}" y="${yy+4}" text-anchor="middle" fill="#fff" style="font:800 15px Archivo">${cat}</text>`;
  yy+=40;
  svg+=`<text x="${boxX+18}" y="${yy}" fill="#fff" style="font:800 16px Archivo">Leaner than ${lp}%<tspan dx="6" fill="#8da0ad" style="font:600 12.5px Inter">of ${state.sex==='male'?'men':'women'} age ${state.age}</tspan></text>`;
  yy+=24;
  const med=Math.round(medAt(state.sex,state.age));
  svg+=`<text x="${boxX+18}" y="${yy}" fill="#cfd8df" style="font:600 13px Inter">Their average is ${med}% — you're ${state.bf<med?(med-state.bf).toFixed(0)+' pts leaner':state.bf>med?(state.bf-med).toFixed(0)+' pts higher':'right at it'}.</text>`;

  svg+=`</svg>`;
  host.innerHTML=svg;

  host.querySelector('svg').addEventListener('click',ev=>{
    const rect=host.querySelector('svg').getBoundingClientRect();
    const px=(ev.clientX-rect.left)/rect.width*W, py=(ev.clientY-rect.top)/rect.height*H;
    if(px<m.l||px>m.l+iw||py<m.t||py>m.t+ih) return;
    state.age=Math.round(A0+(px-m.l)/iw*(A1-A0));
    state.bf=Math.max(4,Math.min(55, Math.round((F1-(py-m.t)/ih*(F1-F0))*2)/2));
    syncInputs(); render();
  });
}

/* ============================ controls ============================ */
function setContext(){ document.getElementById('cContext').textContent = (state.sex==='male'?'Male':'Female')+' · DXA (GE Lunar)'; }
function setNote(){
  const meanTxt = state.sex==='male' ? 'the average man measures 28% on DXA' : 'the average woman measures 39% on DXA';
  const twelve  = state.sex==='male'
    ? '12% would put a man in the leanest ~10% — athlete territory, not "normal."'
    : 'for a woman, 12% is below essential fat — not a safe target.';
  document.getElementById('note').innerHTML =
    `Two things people get wrong. <strong>First, they picture everyone lean.</strong> They\u2019re not \u2014 ${meanTxt}; ${twelve} The dashed line is where the average person your age actually sits (often in yellow). <strong>Second, the healthy band rises with age</strong> \u2014 a little more fat at 60 than at 25 is normal and protective (more reserve, better resilience). Note: these are <strong>DXA</strong> numbers; calipers and scales read several points lower.`;
}
function syncInputs(){
  document.getElementById('ageRange').value=state.age; document.getElementById('ageVal').textContent=state.age;
  document.getElementById('bfRange').value=state.bf; document.getElementById('bfVal').textContent=state.bf+'%';
}
function refresh(){ setContext(); setNote(); render(); }

document.getElementById('sexSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; state.sex=b.dataset.sex;
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b)); refresh();
});
const ageR=document.getElementById('ageRange');
ageR.addEventListener('input',()=>{ state.age=+ageR.value; document.getElementById('ageVal').textContent=ageR.value; render(); });
const bfR=document.getElementById('bfRange');
bfR.addEventListener('input',()=>{ state.bf=+bfR.value; document.getElementById('bfVal').textContent=bfR.value+'%'; render(); });
document.getElementById('spreadChip').addEventListener('click',e=>{
  state.spread=!state.spread; e.currentTarget.setAttribute('aria-pressed',state.spread); render();
});
window.addEventListener('resize', render);

/* gallery embed (sex + age driven by shell) */
(function(){
  const q=new URLSearchParams(location.search); if(!q.get('embed')) return;
  document.body.classList.add('embed');
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function applySA(sx,ag){
    if(sx){ state.sex=sx; document.querySelectorAll('#sexSeg button').forEach(x=>x.setAttribute('aria-pressed',x.dataset.sex===sx)); }
    if(ag!=null&&ag!==''){ state.age=clamp(+ag,20,79); }
    syncInputs(); refresh();
  }
  applySA(q.get('sex'), q.get('age'));
  window.addEventListener('message',e=>{ const d=e.data||{}; if(d.type==='sa') applySA(d.sex,d.age); });
})();

syncInputs(); refresh();
</script>
</body>
</html>
