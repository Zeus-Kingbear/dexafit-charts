<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- © 2026 DexaFit Scottsdale -->
<meta name="copyright" content="© 2026 DexaFit Scottsdale">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cardio Fitness Pyramid — DexaFit Scottsdale Education Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/chrome.css?v=1">
<style>
  :root{
    --ink:#10151B; --ink-soft:#3A4753;
    --surface:#FFFFFF; --surface-2:#EEF3F7; --surface-3:#E2EAF0;
    --brand:#0E9BD6; --brand-deep:#0A6F9E; --peak:#E8862E;
    font-synthesis:none;
  }
  .seg{display:inline-flex;background:var(--surface-2);border-radius:14px;padding:4px;gap:4px;}
  .seg button{border:0;background:transparent;font:inherit;font-weight:700;padding:11px 16px;border-radius:10px;color:var(--ink-soft);cursor:pointer;min-height:46px;}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff;}
  .bigbtn[aria-pressed="true"]{outline:3px solid #10151B;outline-offset:1px;}
  .b44[aria-pressed="true"]{outline-color:#E8862E;}
  .bz2[aria-pressed="true"]{outline-color:#0E9BD6;}
  .agewrap{display:flex;align-items:center;gap:12px;min-width:210px;}
  .agewrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--surface-3),var(--brand));outline:none;}
  .agewrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;}
  .agewrap input[type=range]::-moz-range-thumb{width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);cursor:pointer;}
  .ageval{font-family:"Archivo";font-weight:800;font-size:22px;min-width:38px;text-align:center;}
  .bigbtn{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;border:2px solid var(--surface-3);background:var(--surface);
    border-radius:14px;padding:9px 18px;font:inherit;cursor:pointer;min-height:54px;justify-content:center;}
  .bigbtn b{font-family:"Archivo";font-weight:800;font-size:16px;display:flex;align-items:center;gap:9px;}
  .bigbtn small{font-size:11.5px;color:var(--ink-soft);font-weight:600;padding-left:23px;}
  .bigbtn .dot{width:14px;height:14px;border-radius:4px;}
  .bigbtn.b44{border-color:#F0C9A0;}
  .bigbtn.b44:hover{background:#FDF4EB;}
  .bigbtn.bz2{border-color:#AEDCF0;}
  .bigbtn.bz2:hover{background:#F1F9FD;}
  .chip{display:inline-flex;align-items:center;gap:9px;border:2px solid var(--surface-3);background:var(--surface);border-radius:13px;padding:11px 16px;font:inherit;font-weight:700;color:var(--ink-soft);cursor:pointer;min-height:46px;}
  @media (max-width:860px){ .topbar{gap:12px;padding:12px 14px;} .agewrap{min-width:160px;} }
</style>
<script src="/assets/chrome.js?v=1"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"></div>
    <div class="spacer"></div>
    <div class="ctl-note" style="max-width:40ch">Two ways to grow it — raise the peak with intervals, or widen the base with Zone 2.</div>
  </div>

  <div class="chart">
    <div class="chead">
      <div class="ctitle">Total cardio fitness is a pyramid</div>
      <div class="ccontext">Grow it up with intervals, out with Zone 2 — you need both</div>
    </div>
    <div class="stage">
      <div class="plot" id="plot"></div>
      <div class="controls">
        <button class="bigbtn b44" id="tog44" aria-pressed="false"><b><span class="dot" style="background:#E8862E"></span>4×4 intervals</b><small>raise the peak (VO₂max)</small></button>
        <button class="bigbtn bz2" id="togz2" aria-pressed="false"><b><span class="dot" style="background:#0E9BD6"></span>Zone 2</b><small>widen the base (endurance)</small></button>
        <span class="ctl-note" id="note"></span>
      </div>
    </div>
  </div>
</div>



<script>

window.HELP_TITLE="Building cardio fitness";window.HELP_BODY="<p>Picture your cardio fitness as a pyramid. <strong>4×4 intervals</strong> grow it <strong>up</strong> — a higher VO₂max ceiling. Easy <strong>Zone 2</strong> grows it <strong>out</strong> — a wider endurance base you can actually sustain. Total fitness is the whole pyramid, so it is biggest when you build both.</p><p><strong>How to use it:</strong> toggle each training type to see which direction it grows your pyramid.</p>";


/* ============================================================================
   MODEL  —  research-calibrated, proportions directionally grounded.
   Height = VO₂max (the ceiling; central / stroke-volume limited).
   Base width = endurance = fractional utilization, the % of VO₂max you can hold
     for a long effort (peripheral: mitochondria, capillaries, lactate threshold).
   Area  ∝ Sustainable VO₂ = VO₂max × fraction = the real endurance-performance
     determinant (Joyner–Coyle model; economy held constant).

   Two directions (illustrative, not to scale):
     • 4×4 intervals  → grow the peak UP (VO₂max ceiling); Helgerud 2007 ~+7% in 8 wk.
     • Zone 2 (easy)  → grow the base OUT (endurance you can sustain).
   Height grows ~3x the width for 4×4; width ~3x the height for Zone 2.
   Directional only — the point is which way each training type grows your fitness.
   ========================================================================== */
const state = { i44:false, iz2:false };   // toggles: 4×4 intervals, Zone 2

/* ============================ render ============================ */
function render(){
  const host=document.getElementById('plot');
  const W=1040,H=600;
  const CX=380, baseY=498, H0=190, HW0=140, U=56;      // fixed base pyramid + growth unit
  const tri=(hw,ht)=>`${CX},${(baseY-ht).toFixed(1)} ${(CX-hw).toFixed(1)},${baseY} ${(CX+hw).toFixed(1)},${baseY}`;

  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cardio fitness pyramid: grow up with intervals, out with Zone 2">`;
  svg+=`<defs><linearGradient id="pyr" gradientUnits="userSpaceOnUse" x1="0" y1="${baseY}" x2="0" y2="${baseY-H0}">
    <stop offset="0" stop-color="#0E9BD6"/><stop offset="0.55" stop-color="#2C9AC9"/><stop offset="1" stop-color="#E8862E"/></linearGradient></defs>`;

  /* framing axes (faint) */
  const axL=CX-(HW0+3*U)-30, axTop=baseY-(H0+3*U);
  svg+=`<line x1="${axL}" y1="${baseY}" x2="${axL}" y2="${axTop}" stroke="#10151B" stroke-width="1.5" opacity=".18"/>`;
  svg+=`<path d="M${axL},${axTop} l-6,11 l12,0 Z" fill="#3A4753" opacity=".4"/>`;
  svg+=`<text x="${axL-8}" y="${(baseY+axTop)/2}" text-anchor="middle" transform="rotate(-90 ${axL-8} ${(baseY+axTop)/2})" style="font:800 12px Inter" fill="#8895a1">higher VO₂max peak</text>`;
  svg+=`<text x="${CX}" y="${baseY+64}" text-anchor="middle" style="font:800 12px Inter" fill="#8895a1">wider endurance base</text>`;

  /* base pyramid (fixed) */
  svg+=`<polygon points="${tri(HW0,H0)}" fill="url(#pyr)" stroke="#0A6F9E" stroke-width="2.5"/>`;
  svg+=`<text x="${CX}" y="${baseY-16}" text-anchor="middle" fill="#fff" style="font:800 15px Archivo">Your cardio fitness</text>`;

  /* Zone 2 overlay — wider (width +3U, height +U) */
  if(state.iz2){
    const hw=HW0+3*U, ht=H0+U, ay=baseY-ht;
    svg+=`<polygon points="${tri(hw,ht)}" fill="none" stroke="#0E9BD6" stroke-width="3" stroke-dasharray="10 7"/>`;
    svg+=`<line x1="${CX-HW0}" y1="${baseY+22}" x2="${CX-hw+4}" y2="${baseY+22}" stroke="#0E9BD6" stroke-width="2.5"/><path d="M${CX-hw},${baseY+22} l13,-6 l0,12 Z" fill="#0E9BD6"/>`;
    svg+=`<line x1="${CX+HW0}" y1="${baseY+22}" x2="${CX+hw-4}" y2="${baseY+22}" stroke="#0E9BD6" stroke-width="2.5"/><path d="M${CX+hw},${baseY+22} l-13,-6 l0,12 Z" fill="#0E9BD6"/>`;
    svg+=`<text x="${CX-hw+8}" y="${ay-8}" style="font:900 14px Archivo" fill="#0A6F9E">Zone 2 → wider base</text>`;
  }
  /* 4×4 overlay — taller (height +3U, width +U) */
  if(state.i44){
    const hw=HW0+U, ht=H0+3*U, ay=baseY-ht;
    svg+=`<polygon points="${tri(hw,ht)}" fill="none" stroke="#E8862E" stroke-width="3" stroke-dasharray="10 7"/>`;
    svg+=`<line x1="${CX}" y1="${baseY-H0-6}" x2="${CX}" y2="${ay+10}" stroke="#E8862E" stroke-width="2.5"/><path d="M${CX},${ay} l-7,13 l14,0 Z" fill="#E8862E"/>`;
    svg+=`<text x="${CX}" y="${ay-10}" text-anchor="middle" style="font:900 15px Archivo" fill="#B5651B">4×4 → higher peak</text>`;
  }

  /* explainer card (right) */
  const cX=724,cY=150,cW=288,cH=286, on44=state.i44, onz2=state.iz2;
  svg+=`<rect x="${cX}" y="${cY}" width="${cW}" height="${cH}" rx="15" fill="#10151B"/>`;
  svg+=`<text x="${cX+22}" y="${cY+34}" fill="#8da0ad" style="font:700 12px Inter" letter-spacing="1.4">TWO WAYS TO GROW IT</text>`;
  svg+=`<circle cx="${cX+28}" cy="${cY+68}" r="7" fill="#E8862E" opacity="${on44?1:.4}"/>`;
  svg+=`<text x="${cX+46}" y="${cY+64}" fill="${on44?'#fff':'#8da0ad'}" style="font:800 15px Archivo">4×4 intervals</text>`;
  svg+=`<text x="${cX+46}" y="${cY+84}" fill="#9fb0bd" style="font:600 12.5px Inter">raise the peak — VO₂max ceiling</text>`;
  svg+=`<circle cx="${cX+28}" cy="${cY+124}" r="7" fill="#0E9BD6" opacity="${onz2?1:.4}"/>`;
  svg+=`<text x="${cX+46}" y="${cY+120}" fill="${onz2?'#fff':'#8da0ad'}" style="font:800 15px Archivo">Zone 2 (easy)</text>`;
  svg+=`<text x="${cX+46}" y="${cY+140}" fill="#9fb0bd" style="font:600 12.5px Inter">widen the base — endurance you hold</text>`;
  svg+=`<line x1="${cX+20}" y1="${cY+164}" x2="${cX+cW-20}" y2="${cY+164}" stroke="#2a3540" stroke-width="1"/>`;
  let msg, mcol='#7ee0a4';
  if(on44&&onz2) msg='✓ Both — you grow the whole pyramid. The ~80/20 mix (mostly Zone 2, some 4×4) maximizes total fitness.';
  else if(on44) msg='All ceiling, narrow base. Add Zone 2 so you can actually hold that higher pace.';
  else if(onz2) msg='Big base, low ceiling. Add 4×4 to raise the peak the base can support.';
  else { msg='Toggle each to see which way it grows your fitness — total fitness is the whole pyramid.'; mcol='#cfd8df'; }
  (function(){ const words=msg.split(' '); let line='',ly=cY+194; words.forEach(w=>{ if((line+w).length>34){ svg+=`<text x="${cX+22}" y="${ly}" fill="${mcol}" style="font:700 13px Inter">${line.trim()}</text>`; line=w+' '; ly+=20; } else line+=w+' '; }); if(line.trim()) svg+=`<text x="${cX+22}" y="${ly}" fill="${mcol}" style="font:700 13px Inter">${line.trim()}</text>`; })();

  svg+=`</svg>`;
  host.innerHTML=svg;
}

/* ============================ controls ============================ */
function setNote(){
  document.getElementById('note').innerHTML =
    `Picture cardio fitness as a <strong>pyramid</strong>. <strong>4×4 intervals</strong> grow it <strong>up</strong> — a higher <strong>VO₂max</strong> ceiling (4 min at 90–95% max HR is the strongest stimulus; Helgerud saw ~+7% in 8 weeks). <strong>Zone 2</strong> grows it <strong>out</strong> — a wider aerobic <strong>base</strong> (mitochondria, capillaries, lactate threshold) that sets how much of that ceiling you can actually hold. Total fitness is the <strong>whole pyramid</strong>, so it is biggest when you build <strong>both</strong> — the ~80/20 polarized model, mostly easy with a little hard. Shapes are illustrative — they show which direction each training type grows you, not a scale.`;
}
function refresh(){ setNote(); render(); }

document.getElementById('tog44').addEventListener('click',e=>{ state.i44=!state.i44; e.currentTarget.setAttribute('aria-pressed',state.i44); render(); });
document.getElementById('togz2').addEventListener('click',e=>{ state.iz2=!state.iz2; e.currentTarget.setAttribute('aria-pressed',state.iz2); render(); });
window.addEventListener('resize', render);


refresh();
</script>
</body>
</html>
