<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DexaFit Education Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10151B; --ink-soft:#3A4753;
    --surface:#FFFFFF; --surface-2:#EEF3F7; --surface-3:#E2EAF0;
    --brand:#0E9BD6; --brand-deep:#0A6F9E; --good:#1A9850; --risk:#D64530;
    font-synthesis:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);
    background:var(--surface);-webkit-font-smoothing:antialiased;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100dvh;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 22px;
    border-bottom:1px solid var(--surface-3);background:var(--surface);position:relative;z-index:5;}
  .brand{display:flex;align-items:baseline;gap:2px;font-family:"Archivo";font-weight:900;font-size:22px;
    letter-spacing:-.02em;user-select:none;cursor:pointer;}
  .brand .x{color:var(--brand);}
  .brand small{font-family:"Inter";font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-soft);margin-left:8px;align-self:center;}
  .navback{border:0;background:var(--surface-2);font:inherit;font-weight:700;padding:11px 16px;border-radius:12px;
    cursor:pointer;min-height:46px;display:flex;align-items:center;gap:8px;color:var(--ink);}
  .navback:hover{background:var(--surface-3);}
  .spacer{flex:1 1 auto;}
  .gctl{display:flex;align-items:center;gap:10px;}
  .gctl .lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:14px;padding:4px;gap:4px;}
  .seg button{border:0;background:transparent;font:inherit;font-weight:700;padding:11px 16px;border-radius:10px;
    color:var(--ink-soft);cursor:pointer;min-height:46px;}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff;}
  .agewrap{display:flex;align-items:center;gap:12px;min-width:230px;}
  .agewrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;
    background:linear-gradient(90deg,var(--surface-3),var(--brand));outline:none;}
  .agewrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;
    background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;}
  .agewrap input[type=range]::-moz-range-thumb{width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);cursor:pointer;}
  .ageval{font-family:"Archivo";font-weight:800;font-size:22px;min-width:38px;text-align:center;}
  [hidden]{display:none !important;}

  /* ---------- home / gallery ---------- */
  .home{flex:1;overflow:auto;padding:34px 30px 64px;}
  .home h1{font-family:"Archivo";font-weight:900;font-size:clamp(28px,3.6vw,46px);
    letter-spacing:-.025em;margin:4px 0 8px;max-width:18ch;line-height:1.04;}
  .home .sub{color:var(--ink-soft);font-size:16px;max-width:64ch;margin:0 0 30px;line-height:1.5;}
  .seclbl{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
    margin:34px 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
  .card{text-align:left;border:1px solid var(--surface-3);background:var(--surface);border-radius:18px;padding:0;
    overflow:hidden;cursor:pointer;font:inherit;color:inherit;display:flex;flex-direction:column;
    transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;}
  .card:hover,.card:focus-visible{transform:translateY(-3px);box-shadow:0 14px 34px rgba(16,21,27,.11);
    border-color:var(--brand);outline:none;}
  .card[disabled]{opacity:.55;cursor:default;}
  .card[disabled]:hover{transform:none;box-shadow:none;border-color:var(--surface-3);}
  .thumb{height:158px;background:var(--surface-2);border-bottom:1px solid var(--surface-3);position:relative;}
  .thumb svg{position:absolute;inset:0;width:100%;height:100%;}
  .meta{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1;}
  .meta h3{font-family:"Archivo";font-weight:800;font-size:19px;margin:0 0 6px;letter-spacing:-.01em;}
  .meta p{margin:0 0 14px;font-size:13.5px;color:var(--ink-soft);line-height:1.45;flex:1;}
  .tag{align-self:flex-start;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--brand-deep);background:var(--surface-2);padding:6px 10px;border-radius:999px;}
  .card:hover .tag{background:#E6F4FB;}
  .tag.soon{color:var(--ink-soft);}

  /* ---------- viewer ---------- */
  .viewer{flex:1;min-height:0;}
  .viewer iframe{width:100%;height:100%;border:0;display:block;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="navback" id="navback" hidden>‹ All charts</button>
    <div class="brand" id="brand"><span>DEXA</span><span class="x">FIT</span><small>Education Charts</small></div>
    <div class="spacer"></div>
    <div class="gctl" id="sexCtl" hidden>
      <span class="lbl">Sex</span>
      <div class="seg" id="shellSex">
        <button data-sex="male" aria-pressed="true">Male</button>
        <button data-sex="female" aria-pressed="false">Female</button>
      </div>
    </div>
    <div class="gctl agewrap" id="ageCtl" hidden>
      <span class="lbl">Age</span>
      <input id="shellAge" type="range" min="20" max="90" value="50" step="1">
      <span class="ageval" id="shellAgeVal">50</span>
    </div>
  </div>

  <div class="home" id="home">
    <h1>Explain it on the screen, not the whiteboard.</h1>
    <p class="sub">Interactive charts for client and staff consultations. Set sex and age once — it carries into every chart. Tap a chart to open the full interactive version on the screen.</p>
    <div class="seclbl">Charts</div>
    <div class="grid" id="gridLive"></div>
    <div class="seclbl">In the works</div>
    <div class="grid" id="gridSoon"></div>
  </div>

  <div class="viewer" id="viewer" hidden>
    <iframe id="frame" title="chart" allow="fullscreen"></iframe>
  </div>
</div>

  </svg>`,
  'soon':`<svg viewBox="0 0 300 158" preserveAspectRatio="xMidYMid slice">
    <line x1="20" y1="120" x2="280" y2="120" stroke="#CDD8E0" stroke-width="2"/>

};

/* ===================== catalog ===================== */
const LIVE = [
  {id:'muscle-decline', file:'muscle-decline.html', cat:'Muscle', sa:true, amin:30, amax:90,
   title:'Muscle decline with age',
   blurb:'Mass, strength and power across a lifetime — and the age power crosses the functional floor. Trained vs. untrained.'},
  {id:'vo2', file:'vo2-percentile.html', cat:'Cardiorespiratory', sa:true, amin:20, amax:80,
   title:'VO₂ max percentiles',
   blurb:'Where a cardio number ranks by age and sex, and how simply holding it climbs you up the field over time.'},
  {id:'vt-thresholds', file:'vt-thresholds.html', cat:'Cardiorespiratory', sa:false,
   title:'VT1 / VT2 — your gears',
   blurb:'The two ventilatory thresholds inside your VO₂ test set your real training zones — and training moves them, not just your ceiling.'},
  {id:'vo2-decomposition', file:'vo2-decomposition.html', cat:'Cardiorespiratory', sa:false,
   title:'What moves your VO₂max',
   blurb:'VO₂max is engine ÷ body mass — so losing fat raises it without raising fitness. We divide by lean mass to tell real gains from weight changes.'},
  {id:'almi', file:'almi-percentile.html', cat:'Muscle', sa:true, amin:20, amax:80,
   title:'Lean mass percentiles',
   blurb:'Appendicular lean mass vs. the sarcopenia floor, or total lean mass vs. the natural muscle ceiling.'},
  {id:'bone-density', file:'bone-density.html', cat:'Bone', sa:true, amin:20, amax:90,
   title:'Bone density (T-score)',
   blurb:'The classic DEXA bone chart, made live — total body, spine, hip or femoral neck. Plot a T-score by age; read the category, the Z-score vs. peers, and the trajectory ahead.'},
  {id:'body-fat', file:'body-fat.html', cat:'Body composition', sa:true, amin:20, amax:79,
   title:'Healthy body fat %',
   blurb:'Two myths, one chart: nobody walks around at 12%, and the healthy band rises with age. DXA-accurate zones with the real population overlaid.'},
  {id:'visceral-fat', file:'visceral-fat.html', cat:'Body composition', sa:true, amin:20, amax:79,
   title:'Visceral fat (lbs)',
   blurb:'The fat around your organs, on a risk ladder in pounds — what the number means, where you rank, and how fast it falls when you train.'},
  {id:'cardio-pyramid', file:'cardio-pyramid.html', cat:'Cardiorespiratory', sa:true, amin:20, amax:79,
   title:'Cardio fitness pyramid',
   blurb:'Build total cardio fitness block by block: 4×4 intervals raise the VO₂max peak, Zone 2 widens the endurance base — and balance wins.'},
  {id:'progressive-overload', file:'progressive-overload.html', cat:'Training', sa:false,

   blurb:'Why the same workout flattens out while adding a little each week keeps climbing — drag the weekly nudge to zero and watch them merge.'},

   title:'Medicine 3.0 — healthspan',
   blurb:'Healthspan vs. lifespan: medicine alone just stretches the tail, but investing in reserve squares the curve and shrinks the years in decline.'},
  {id:'mobility', file:'mobility.html', cat:'Mobility', sa:false,
   title:'Mobility (sit-rise test)',

  {id:'precision', file:'precision-accuracy.html', cat:'Reading results', sa:false,

   blurb:'Why a DEXA scan detects a real 1–2 point change that a bathroom scale can only guess at.'},
  {id:'stddev', file:'standard-deviations.html', cat:'Reading results', sa:false,
   title:'Standard deviations & T-scores',
   blurb:'The bell curve behind every percentile — with rarity framing and a bone-density T-score mode.'},
];
const SOON = [
  {id:'soon', title:'Biological age — capstone', blurb:'How old your body really measures, tying the whole panel into one number.'},
  {id:'soon', title:'Arterial health', blurb:'Vascular age and stiffness, from the advanced arterial assessment.'},
];

/* ===================== state ===================== */
const state = { sex:'male', age:50, chart:null };
const $ = id => document.getElementById(id);
const frame=$('frame'), home=$('home'), viewer=$('viewer'), navback=$('navback');
const sexCtl=$('sexCtl'), ageCtl=$('ageCtl'), shellAge=$('shellAge'), shellAgeVal=$('shellAgeVal');

/* ===================== home ===================== */
function cardHTML(c, soon){
  const thumb = T[c.id] || T.soon;
  const tag = soon ? `<span class="tag soon">Soon</span>` : `<span class="tag">${c.cat}</span>`;
  const attr = soon ? 'disabled' : `onclick="openChart('${c.id}')"`;
  return `<button class="card" ${attr}><div class="thumb">${thumb}</div>
    <div class="meta"><h3>${c.title}</h3><p>${c.blurb}</p>${tag}</div></button>`;
}
$('gridLive').innerHTML = LIVE.map(c=>cardHTML(c,false)).join('');
$('gridSoon').innerHTML = SOON.map(c=>cardHTML(c,true)).join('');

/* ===================== navigation ===================== */
function pushSA(){
  if(state.chart && state.chart.sa && frame.contentWindow){
    frame.contentWindow.postMessage({type:'sa', sex:state.sex, age:state.age}, '*');
  }
}
function openChart(id){
  const c = LIVE.find(x=>x.id===id); if(!c) return;
  state.chart = c;
  // global controls visibility + age range
  sexCtl.hidden = !c.sa; ageCtl.hidden = !c.sa;
  if(c.sa){
    shellAge.min=c.amin; shellAge.max=c.amax;
    state.age = Math.max(c.amin, Math.min(c.amax, state.age));
    shellAge.value=state.age; shellAgeVal.textContent=state.age;
  }
  // build src with first-paint params
  let src = c.file + '?embed=1';
  if(c.sa) src += '&sex='+state.sex+'&age='+state.age;
  frame.src = src;
  frame.onload = pushSA;            // re-sync once loaded
  home.hidden = true; viewer.hidden = false; navback.hidden = false;
}
function goHome(){
  state.chart = null;
  frame.onload = null; frame.src = 'about:blank';
  viewer.hidden = true; home.hidden = false; navback.hidden = true;
  sexCtl.hidden = true; ageCtl.hidden = true;
}
navback.addEventListener('click', goHome);
$('brand').addEventListener('click', ()=>{ if(state.chart) goHome(); });

/* ===================== global sex / age ===================== */
$('shellSex').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  state.sex=b.dataset.sex;
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed', x===b));
  pushSA();
});
shellAge.addEventListener('input', ()=>{
  state.age=+shellAge.value; shellAgeVal.textContent=shellAge.value; pushSA();
});
</script>
</body>
</html>
