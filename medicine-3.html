<html lang="en">

<title>Medicine 3.0 — DexaFit Scottsdale Education Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/chrome.css?v=1">
<style>
  :root{
    --ink:#10151B; --ink-soft:#3A4753;
    --surface:#FFFFFF; --surface-2:#EEF3F7; --surface-3:#E2EAF0;
    --brand:#0E9BD6; --brand-deep:#0A6F9E; --good:#1F9D55; --risk:#DC4636; --flat:#8C9AA6;
    font-synthesis:none;
  }
  .investwrap,.agewrap{display:flex;align-items:center;gap:12px;}
  .investwrap{min-width:300px;}
  .agewrap{min-width:210px;}
  .investwrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--flat),var(--good));outline:none;}
  .agewrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--surface-3),var(--brand));outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;}
  .investwrap input[type=range]::-webkit-slider-thumb{border-color:var(--good);}
  input[type=range]::-moz-range-thumb{width:32px;height:32px;border-radius:50%;background:#fff;border:4px solid var(--brand);cursor:pointer;}
  .investval,.ageval{font-family:"Archivo";font-weight:800;font-size:22px;min-width:54px;text-align:center;}
  @media (max-width:860px){ .topbar{gap:12px;padding:12px 14px;} .investwrap{min-width:220px;} .agewrap{min-width:150px;} }
</style>
<script src="/assets/chrome.js?v=1"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"></div>
    <div class="spacer"></div>
    <div class="ctl-note" style="max-width:46ch">A conceptual model of Peter Attia’s Medicine 3.0 — shapes are illustrative, not patient data.</div>
  </div>

  <div class="chart">
    <div class="chead">
      <div class="ctitle">Healthspan vs. lifespan</div>
      <div class="ccontext">Adding good years, not just years</div>
    </div>
    <div class="stage">
      <div class="plot" id="plot"></div>
      <div class="controls">
        <div class="gctl investwrap">
          <span class="lbl" style="white-space:nowrap">Healthspan investment</span>
          <input id="investRange" type="range" min="0" max="100" value="55" step="1">
          <span class="investval" id="investVal" style="min-width:118px;font-size:18px">Committed</span>
        </div>
        <div class="gctl agewrap">
          <span class="lbl" style="white-space:nowrap">Your age now</span>
          <input id="ageRange" type="range" min="30" max="100" value="50" step="1">
          <span class="ageval" id="ageVal">50</span>
        </div>
        <span class="ctl-note" id="note"></span>
      </div>
    </div>
  </div>
</div>



<script>

window.HELP_TITLE="Healthspan vs. lifespan";window.HELP_BODY="<p>Medicine 2.0 stretches how long you live but mostly adds <strong>frail years at the end</strong> \u2014 no intervention and Medicine 2.0 share the same healthy curve; 2.0 just extends the low tail. <strong>Medicine 3.0</strong> squares the curve: hold function high for longer, then a short steep drop, so the years needing help shrink.</p><p><strong>How to use it:</strong> drag <em>Healthspan investment</em> (training, strength, nutrition, sleep) from none to maximal and watch your curve bend from the Medicine 2.0 tail toward Medicine 3.0.</p>";


/* ============================================================================
   CONCEPTUAL MODEL of Peter Attia's Medicine 3.0 (Outlive) and the compression-
   of-morbidity idea (Fries 1980). Function = physical/cognitive capacity as % of
   personal peak; a logistic decline with two levers:
     mid = the age you're still at 50% (how long you hold function)
     w   = how drawn-out the decline is (small = compressed/"squared")
   Anchored on real phenomena (function ~halves by the 8th decade; VO₂max & muscle
   fall with age) but the exact shapes are illustrative, not a dataset.
     • No intervention   mid 76 / w 5.0  → decline starts mid-life, lose independence ~78
     • Medicine 2.0      mid 77.5 / w 7.5 → death delayed, but the curve just stretches
                           right at the bottom: more years, mostly in decline
     • Medicine 3.0      mid 88 / w 2.8  → hold function into the late 80s, then a short,
                           compressed final decline ("square the curve")
   The bold "Your trajectory" morphs from No-intervention (0%) to Medicine 3.0 (100%).
   ========================================================================== */
/* Control-point curves (age -> % of peak function), matched to Attia's Fig. 2.
   No intervention and Medicine 2.0 SHARE the curve down through ~50%; Medicine 2.0
   then extends the low tail (more lifespan, but frail years). Medicine 3.0 "squares"
   the curve: hold high function far longer, then a short steep final drop. */
const NOINT=[[30,100],[58,100],[64,97],[69,88],[73,72],[76,52],[79,32],[81,17],[83,6],[84.5,0]];
const MED2 =[[30,100],[58,100],[64,97],[69,88],[73,72],[76,52],[80,38],[83,26],[86,15],[88,6],[89.5,0]];
const MED3 =[[30,100],[70,100],[74,98],[78,92],[82,80],[85,62],[87,48],[89,32],[91,18],[92.5,7],[94,0]];
const REF={ noint:{col:'#8C9AA6'}, med2:{col:'#6B7884'} };
const THRESH=50;                          // independence threshold (% of peak function)
function evalCp(cp,age){ if(age<=cp[0][0])return cp[0][1]; if(age>=cp[cp.length-1][0])return 0;
  for(let i=0;i<cp.length-1;i++){ const a=cp[i][0],va=cp[i][1],b=cp[i+1][0],vb=cp[i+1][1]; if(age>=a&&age<=b) return va+(vb-va)*(age-a)/(b-a); } return 0; }
const youAt=(age,t)=>evalCp(MED2,age)+(evalCp(MED3,age)-evalCp(MED2,age))*t;   // 0 = Med2, 1 = Med3
function crossCp(fn,val){ for(let a=30;a<=110;a+=0.1){ if(fn(a)<=val) return a; } return 110; }

const state = { invest:55, age:50 };

/* ============================ render ============================ */
function render(){
  const host=document.getElementById('plot');
  const W=1040,H=600,m={l:78,r:130,t:48,b:78};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const A0=20,A1=100;
  const X=a=>m.l+(a-A0)/(A1-A0)*iw;
  const Y=f=>m.t+(100-f)/100*ih;
  const baseY=m.t+ih;
  const samp=fn=>{ let s=[]; for(let a=A0;a<=A1;a+=0.5) s.push(X(a).toFixed(1)+','+Y(fn(a)).toFixed(1)); return 'M'+s.join(' L'); };

  const t=state.invest/100;
  const youFn=a=>youAt(a,t);
  const youHS=crossCp(youFn,THRESH), youLS=crossCp(youFn,3);
  const med2HS=crossCp(a=>evalCp(MED2,a),THRESH);

  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Healthspan versus lifespan curves">`;

  /* grid */
  for(let f=0;f<=100;f+=20){
    svg+=`<line x1="${m.l}" y1="${Y(f)}" x2="${m.l+iw}" y2="${Y(f)}" stroke="#10151B" stroke-width="1" opacity=".07"/>`;
    svg+=`<text x="${m.l-12}" y="${Y(f)+5}" text-anchor="end" style="font:600 13px Inter" fill="#3A4753">${f}%</text>`;
  }
  for(let a=20;a<=100;a+=10){
    svg+=`<text x="${X(a)}" y="${baseY+26}" text-anchor="middle" style="font:700 14px Inter" fill="#10151B">${a}</text>`;
  }
  svg+=`<text x="${m.l+iw/2}" y="${baseY+48}" text-anchor="middle" style="font:800 13px Inter" fill="#3A4753">Age (years)</text>`;
  svg+=`<text x="${m.l-50}" y="${m.t-22}" style="font:800 13px Inter" fill="#3A4753">Function (% of peak)</text>`;

  /* marginal-decade band (the years in decline on YOUR path) */
  svg+=`<rect x="${X(youHS)}" y="${m.t}" width="${X(youLS)-X(youHS)}" height="${ih}" fill="#DC4636" opacity=".07"/>`;

  /* independence threshold */
  svg+=`<line x1="${m.l}" y1="${Y(THRESH)}" x2="${m.l+iw}" y2="${Y(THRESH)}" stroke="#10151B" stroke-width="1.8" stroke-dasharray="7 5" opacity=".55"/>`;
  svg+=`<text x="${m.l+10}" y="${Y(THRESH)-8}" style="font:700 12.5px Inter" fill="#3A4753">Independence threshold — daily life needs help below here</text>`;

  /* reference curves */
  svg+=`<path d="${samp(a=>evalCp(NOINT,a))}" fill="none" stroke="${REF.noint.col}" stroke-width="2.5" opacity=".6"/>`;
  svg+=`<path d="${samp(a=>evalCp(MED2,a))}" fill="none" stroke="${REF.med2.col}" stroke-width="2.5" stroke-dasharray="9 6" opacity=".9"/>`;

  /* your trajectory (bold) */
  const youCol = t>0.66?'#1F9D55':'#0E9BD6';
  svg+=`<path d="${samp(youFn)}" fill="none" stroke="${youCol}" stroke-width="5.5" stroke-linecap="round"/>`;

  /* curve labels */
  svg+=`<text x="${X(78)}" y="${Y(evalCp(NOINT,78))+22}" text-anchor="end" style="font:800 13px Archivo" fill="#6B7884">No intervention</text>`;
  svg+=`<text x="${X(86)}" y="${Y(evalCp(MED2,86))-9}" style="font:800 13px Archivo" fill="#566069">Medicine 2.0 — more years, but frail</text>`;
  const ylx=63, yly=Y(youFn(ylx));
  svg+=`<text x="${X(ylx)}" y="${yly-14}" style="font:900 15px Archivo" fill="${t>0.66?'#177A41':'#0A6F9E'}">Your path${t>=0.99?' (Medicine 3.0)':''}</text>`;

  /* healthspan dots */
  const dot=(age,col,r)=>`<circle cx="${X(age)}" cy="${Y(THRESH)}" r="${r}" fill="${col}"/>`;
  svg+=dot(med2HS,'#8C9AA6',5);
  svg+=dot(youHS,youCol,7)+`<rect x="${X(youHS)-1.5}" y="${Y(THRESH)}" width="3" height="${baseY-Y(THRESH)}" fill="${youCol}" opacity=".25"/>`;

  /* marginal-decade bracket under axis */
  const bx0=X(youHS),bx1=X(youLS),by=baseY+58;
  svg+=`<path d="M${bx0},${by-7} L${bx0},${by} L${bx1},${by} L${bx1},${by-7}" fill="none" stroke="#B23A2C" stroke-width="2"/>`;
  svg+=`<text x="${(bx0+bx1)/2}" y="${by+18}" text-anchor="middle" style="font:800 12.5px Archivo" fill="#B23A2C">${Math.round(youLS-youHS)} years below the line — needing help</text>`;

  /* you-are-here */
  const ax=X(state.age), af=youFn(state.age);
  svg+=`<line x1="${ax}" y1="${m.t}" x2="${ax}" y2="${baseY}" stroke="#10151B" stroke-width="1.3" stroke-dasharray="3 5" opacity=".4"/>`;
  svg+=`<circle cx="${ax}" cy="${Y(af)}" r="6" fill="#fff" stroke="${youCol}" stroke-width="4"/>`;
  svg+=`<text x="${ax}" y="${m.t-6}" text-anchor="middle" style="font:700 12px Inter" fill="#3A4753">you are here · ${state.age}</text>`;

  /* readout card (bottom-left empty space) */
  const cX=m.l+12,cY=baseY-176,cW=300,cH=164;
  svg+=`<rect x="${cX}" y="${cY}" width="${cW}" height="${cH}" rx="14" fill="#10151B"/>`;
  svg+=`<text x="${cX+20}" y="${cY+32}" fill="#8da0ad" style="font:700 12px Inter" letter-spacing="1.4">YOUR HEALTHSPAN</text>`;
  svg+=`<text x="${cX+20}" y="${cY+74}" fill="#fff" style="font:900 40px Archivo">${Math.round(youHS)}<tspan dx="6" fill="#8da0ad" style="font:600 14px Inter">yrs of independent life</tspan></text>`;
  svg+=`<line x1="${cX+18}" y1="${cY+92}" x2="${cX+cW-18}" y2="${cY+92}" stroke="#2a3540" stroke-width="1"/>`;
  svg+=`<text x="${cX+20}" y="${cY+116}" fill="#cfd8df" style="font:600 13.5px Inter">Lifespan</text>`;
  svg+=`<text x="${cX+cW-20}" y="${cY+116}" text-anchor="end" fill="#fff" style="font:800 15px Archivo">${Math.round(youLS)}</text>`;
  svg+=`<text x="${cX+20}" y="${cY+140}" fill="#f0b9b1" style="font:600 13.5px Inter">Years in decline</text>`;
  svg+=`<text x="${cX+cW-20}" y="${cY+140}" text-anchor="end" fill="#fff" style="font:800 15px Archivo">${Math.round(youLS-youHS)}</text>`;
  const gain=Math.round(youHS-med2HS);
  svg+=`<text x="${cX+20}" y="${cY+162}" fill="#7ee0a4" style="font:700 13px Inter">${gain>0?'+'+gain+' healthy years vs. Medicine 2.0 alone':'on the Medicine 2.0 path (frail tail)'}</text>`;

  svg+=`</svg>`;
  host.innerHTML=svg;
}

/* ============================ controls ============================ */
function setNote(){
  document.getElementById('note').innerHTML =
    `<strong>Lifespan</strong> is how long you live; <strong>healthspan</strong> is how long you live <em>well</em>. The key idea: <strong>no intervention and Medicine 2.0 follow the same curve</strong> through your healthy years \u2014 modern medicine (Medicine 2.0) mostly <strong>extends the tail</strong>, adding years <em>below</em> the independence line (more lifespan, spent frail). <strong>Medicine 3.0</strong> does something different \u2014 it <strong>squares the curve</strong>: you hold high function far longer, then decline fast at the very end, so the frail window shrinks. The lever is <strong>reserve you build now</strong>: VO₂max, strength, and muscle all fall with age, so the higher you build them (plus nutrition and sleep), the later you cross the line where daily life needs help. Slide <strong>Healthspan investment</strong> from none to maximal to bend your curve from the Medicine 2.0 tail toward a squared Medicine 3.0.`;
}
function tier(v){ return v<13?'None':v<41?'Light':v<73?'Committed':'Maximal'; }
function refresh(){ document.getElementById('investVal').textContent=tier(state.invest); setNote(); render(); }
const investR=document.getElementById('investRange');
investR.addEventListener('input',()=>{ state.invest=+investR.value; document.getElementById('investVal').textContent=tier(state.invest); render(); });
const ageR=document.getElementById('ageRange');
ageR.addEventListener('input',()=>{ state.age=+ageR.value; document.getElementById('ageVal').textContent=ageR.value; render(); });
window.addEventListener('resize', render);


refresh();
</script>
</body>
</html>
