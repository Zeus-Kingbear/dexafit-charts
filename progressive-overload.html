  @media (max-width:860px){ .topbar{gap:12px;padding:12px 14px;} .incwrap{min-width:190px;} }
  .brand .loc{color:var(--ink);margin-left:8px;}
  .helpBtn{position:fixed;top:14px;right:16px;z-index:40;width:40px;height:40px;border-radius:50%;border:2px solid var(--brand);background:#fff;color:var(--brand-deep);font-family:"Archivo";font-weight:900;font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;}
  .helpBtn:hover{background:var(--brand);color:#fff;}

  .helpModal[hidden]{display:none;}
  .helpCard{background:#fff;border-radius:18px;max-width:560px;width:100%;padding:30px 32px 22px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:88vh;overflow:auto;}
  .helpClose{position:absolute;top:14px;right:16px;border:0;background:var(--surface-2);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .helpCard h2{font-family:"Archivo";font-weight:900;font-size:24px;margin:0 0 14px;letter-spacing:-.02em;}

<div class="app">
  <div class="topbar">
    <div class="brand"><span>DEXA</span><span class="x">FIT</span><span class="loc">Scottsdale</span><small>Education Charts</small></div>

<script>
/* DexaFit Scottsdale — domain lock (recommended level) */
(function(){var ALLOW=['charts.kingbear.co','localhost','127.0.0.1'],REDIRECT='https://www.dexafit.com';var h=(location.hostname||'').toLowerCase();var ok=h===''||h.endsWith('.vercel.app')||ALLOW.some(function(d){return h===d||h.endsWith('.'+d);});if(!ok){document.documentElement.innerHTML='<div style="font:600 18px/1.5 system-ui;padding:48px;color:#10151B;max-width:620px">This interactive content is © DexaFit Scottsdale and is licensed for use only on its official site. <a href="'+REDIRECT+'" style="color:#0A6F9E">Visit DexaFit Scottsdale →</a></div>';throw new Error('DexaFit Scottsdale: unlicensed host');}})();
/* DexaFit Scottsdale — help */
var HELP_TITLE="Progressive overload";var HELP_BODY="<p>Why the same workout stops working. Repeating identical sessions plateaus, while adding a little each week keeps you climbing.</p><p><strong>How to use it:</strong> drag the weekly increase toward zero and watch the two paths merge \u2014 a workout that has stopped challenging you.</p>";
(function(){var hb=document.getElementById('helpBtn'),hm=document.getElementById('helpModal');if(!hb||!hm)return;document.getElementById('helpTitle').textContent=HELP_TITLE;document.getElementById('helpBody').innerHTML=HELP_BODY;hb.addEventListener('click',function(){hm.hidden=false;});document.getElementById('helpClose').addEventListener('click',function(){hm.hidden=true;});hm.addEventListener('click',function(e){if(e.target.id==='helpModal')hm.hidden=true;});})();

/* ============================================================================
   MODEL  (phenomenological, tuned to realistic ranges — a teaching model, not a
   physiology engine). Adaptation has two parts:
     • newbie(w): adaptation to the INITIAL workout — same for both paths, and it
       PLATEAUS (an exponential approach). Once you've adapted to a fixed workout,
       the stimulus no longer exceeds your capacity, so it stops driving change.
     • prog(w): extra gain from progressively adding load. Accumulates toward a
       ceiling; its speed is set by how much you add each week.
   At 0%/week the two paths are identical — "progressive overload" with no
   progression is just the same workout.
   Targets: New lifter, +3%/wk → fixed ≈ +10%, progressive ≈ +31% over 16 wk.
   ========================================================================== */
const WEEKS=16;
const P   = { novice:0.10, experienced:0.05 };   // fixed-workout plateau (fraction)
const TAU = { novice:3.5,  experienced:2.6  };   // weeks to plateau
const SPAN= { novice:0.55, experienced:0.30 };   // ceiling of extra progression gain
const PRATE=0.55;

function curve(mode,inc,lvl){
  const p=P[lvl],tau=TAU[lvl],span=SPAN[lvl];
  const pts=[]; let prog=0;
  for(let w=0;w<=WEEKS;w++){
    const newbie=p*(1-Math.exp(-w/tau));
    if(mode==='prog'&&w>0) prog+=inc*PRATE*(1-prog/span);
    pts.push(1+newbie+(mode==='prog'?prog:0));
  }
  return pts;
}

const state = { lvl:'novice', inc:3, why:false };

/* ============================ render ============================ */
function render(){
  const host=document.getElementById('plot');
  const W=1040,H=600,m={l:84,r:168,t:50,b:66};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const Y0=92,Y1=156;
  const X=w=>m.l+(w/WEEKS)*iw;
  const Y=v=>m.t+(Y1-v*100)/(Y1-Y0)*ih;
  const inc=state.inc/100;
  const same=curve('same',inc,state.lvl), prog=curve('prog',inc,state.lvl);
  const poly=a=>'M'+a.map((v,w)=>X(w).toFixed(1)+','+Y(v).toFixed(1)).join(' L');

  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Progressive overload vs repeating the same workout">`;

  /* grid */
  for(let g=100;g<=150;g+=10){
    svg+=`<line x1="${m.l}" y1="${Y(g/100)}" x2="${m.l+iw}" y2="${Y(g/100)}" stroke="#10151B" stroke-width="1" opacity="${g===100?.22:.07}" ${g===100?'stroke-dasharray="5 5"':''}/>`;
    svg+=`<text x="${m.l-12}" y="${Y(g/100)+5}" text-anchor="end" style="font:600 13px Inter" fill="#3A4753">${g===100?'start':'+'+(g-100)+'%'}</text>`;
  }
  for(let w=0;w<=WEEKS;w+=4){
    svg+=`<text x="${X(w)}" y="${m.t+ih+26}" text-anchor="middle" style="font:700 14px Inter" fill="#10151B">${w}</text>`;
  }
  svg+=`<text x="${m.l+iw/2}" y="${m.t+ih+50}" text-anchor="middle" style="font:800 13px Inter" fill="#3A4753">Weeks of training</text>`;
  svg+=`<text x="${m.l-58}" y="${m.t-24}" style="font:800 13px Inter" fill="#3A4753">Strength (% of start)</text>`;

  /* mechanism layer */
  if(state.why){
    // fixed workout demand line (flat) — capacity rises to it then stalls
    const demand=1+P[state.lvl];
    svg+=`<line x1="${m.l}" y1="${Y(demand)}" x2="${m.l+iw}" y2="${Y(demand)}" stroke="#8C9AA6" stroke-width="2" stroke-dasharray="7 5"/>`;
    svg+=`<text x="${m.l+10}" y="${Y(demand)-8}" style="font:700 12px Inter" fill="#6B7884">fixed workout demand</text>`;
    // progressive: the load you lift — a rising staircase above capacity
    if(inc>0){
      let d=`M${X(0)},${Y(prog[0]*(1+inc))}`;
      for(let w=1;w<=WEEKS;w++){ d+=` L${X(w)},${Y(prog[w-1]*(1+inc))} L${X(w)},${Y(prog[w]*(1+inc))}`; }
      svg+=`<path d="${d}" fill="none" stroke="#0E9BD6" stroke-width="1.6" opacity=".5" stroke-dasharray="2 3"/>`;
      // maintained gap shading (stimulus always above capacity)
      let gap=`M${X(0)},${Y(prog[0])}`;
      for(let w=1;w<=WEEKS;w++) gap+=` L${X(w)},${Y(prog[w])}`;
      for(let w=WEEKS;w>=1;w--) gap+=` L${X(w)},${Y(prog[w]*(1+inc))} L${X(w)},${Y(prog[w-1]*(1+inc))}`;
      gap+=` L${X(0)},${Y(prog[0]*(1+inc))} Z`;
      svg+=`<path d="${gap}" fill="#0E9BD6" opacity=".08"/>`;
      svg+=`<text x="${X(WEEKS)-6}" y="${Y(prog[WEEKS]*(1+inc))-8}" text-anchor="end" style="font:700 12px Inter" fill="#0A6F9E">load you lift — keeps rising</text>`;
    }
    // plateau annotation on the same-workout curve
    let pw=WEEKS; for(let w=1;w<=WEEKS;w++){ if(same[w]>=demand-0.004){ pw=w; break; } }
    const ax=X(pw), ay=Y(same[pw]);
    svg+=`<circle cx="${ax}" cy="${ay}" r="5.5" fill="#6B7884"/>`;
    svg+=`<text x="${ax+10}" y="${ay+34}" style="font:700 12.5px Inter" fill="#5A6772">workout no longer challenges you —</text>`;
    svg+=`<text x="${ax+10}" y="${ay+50}" style="font:700 12.5px Inter" fill="#5A6772">nothing new to adapt to → plateau</text>`;
  }

  /* the two capacity curves */
  svg+=`<path d="${poly(same)}" fill="none" stroke="#8C9AA6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=`<path d="${poly(prog)}" fill="none" stroke="#0E9BD6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`;

  /* end labels */
  const sg=Math.round((same[WEEKS]-1)*100), pg=Math.round((prog[WEEKS]-1)*100);
  const identical=Math.abs(prog[WEEKS]-same[WEEKS])<0.015;
  if(identical){
    svg+=`<text x="${m.l+iw+12}" y="${Y(prog[WEEKS])+5}" style="font:800 16px Archivo" fill="#6B7884">+${pg}%</text>`;
    svg+=`<text x="${m.l+iw+12}" y="${Y(prog[WEEKS])+24}" style="font:600 12px Inter" fill="#8C9AA6">lines overlap</text>`;
  } else {
    svg+=`<text x="${m.l+iw+12}" y="${Y(prog[WEEKS])+4}" style="font:900 19px Archivo" fill="#0A6F9E">+${pg}%</text>`;
    svg+=`<text x="${m.l+iw+12}" y="${Y(prog[WEEKS])+22}" style="font:700 11.5px Inter" fill="#0E9BD6">still climbing</text>`;
    svg+=`<text x="${m.l+iw+12}" y="${Y(same[WEEKS])+4}" style="font:900 17px Archivo" fill="#6B7884">+${sg}%</text>`;
    svg+=`<text x="${m.l+iw+12}" y="${Y(same[WEEKS])+22}" style="font:700 11.5px Inter" fill="#8C9AA6">plateaued</text>`;
  }
  /* inline curve tags */
  svg+=`<text x="${X(11)}" y="${Y(prog[11])-14}" style="font:800 14px Archivo" fill="#0A6F9E">Progressive overload</text>`;
  svg+=`<text x="${X(12.5)}" y="${Y(same[12])+26}" style="font:800 14px Archivo" fill="#6B7884">Same workout</text>`;

  /* zero-increment callout */
  if(state.inc===0){
    svg+=`<rect x="${m.l+iw/2-188}" y="${m.t+8}" width="376" height="40" rx="9" fill="#10151B" opacity=".92"/>`;
    svg+=`<text x="${m.l+iw/2}" y="${m.t+34}" text-anchor="middle" fill="#fff" style="font:700 14px Inter">0% per week = the same workout. Add nothing, change nothing.</text>`;
  }

  svg+=`</svg>`;
  host.innerHTML=svg;
}

/* ============================ controls ============================ */
function setNote(){
  document.getElementById('note').innerHTML =
    `Your body adapts to a <strong>specific</strong> demand. Each session breaks tissue down a little; you recover and rebuild slightly stronger (<strong>supercompensation</strong>). But once you\u2019ve adapted to a fixed workout, that same weight no longer exceeds what you can already do \u2014 there\u2019s nothing new to respond to, so you <strong>plateau</strong>. The fix is small and boring: nudge the load, reps, or sets up a little each week so the bar always sits just above your current capacity. Same schedule, same time in the gym \u2014 the only change is that upward nudge, and it\u2019s the difference between flat and climbing. Real-world sustainable progression is roughly <strong>1\u20133% per week</strong> (faster when you\u2019re new); push too fast and recovery, not motivation, becomes the limit.`;
}
function syncInputs(){ document.getElementById('incVal').textContent='+'+state.inc+'%/wk'; document.getElementById('incRange').value=state.inc; }
function refresh(){ setNote(); render(); }
document.getElementById('lvlSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; state.lvl=b.dataset.lvl;
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b)); render();
});
const incR=document.getElementById('incRange');
incR.addEventListener('input',()=>{ state.inc=+incR.value; document.getElementById('incVal').textContent='+'+incR.value+'%/wk'; render(); });
document.getElementById('whyChip').addEventListener('click',e=>{
  state.why=!state.why; e.currentTarget.setAttribute('aria-pressed',state.why); render();
});
window.addEventListener('resize', render);

/* gallery embed */
(function(){ const q=new URLSearchParams(location.search); if(q.get('embed')) document.body.classList.add('embed'); })();

syncInputs(); refresh();
</script>
